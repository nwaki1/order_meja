services:
  postgres:
    image: postgres:16-alpine
    container_name: sportiva-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sportiva
      POSTGRES_PASSWORD: sportiva
      POSTGRES_DB: sportiva
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportiva"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sportiva-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://sportiva:sportiva@postgres:5432/sportiva
      PORT: 3000
      RUST_LOG: sportiva_backend=info,tower_http=info
    ports:
      - "3000:3000"

volumes:
  postgres_data:
